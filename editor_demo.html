<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiNT-II | Leesbaarheidsanalyse</title>
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #cecfb1;
            font-family: Verdana, sans-serif;
            font-size: 13px;
            color: #525347;
            padding: 2rem;
        }

        #stage {
            max-width: 900px;
            margin: 0 auto;
        }

        #header {
            display: flex;
            align-items: flex-end;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        #logo {
            flex-shrink: 0;
            width: 176px;
            height: 121px;
            background: url('https://raw.githubusercontent.com/proycon/valkuil/master/webvalkuil/style/valkuil_logo.png') no-repeat left center;
            background-size: contain;
        }

        #header-text h1 {
            font-size: 18px;
            font-weight: bold;
            color: #525347;
            margin-bottom: 0.25rem;
        }

        #header-text p {
            font-size: 11px;
            color: #676758;
            line-height: 1.5;
        }

        #ruler {
            height: 2px;
            background: #b3b3ab;
            margin-bottom: 1.5rem;
        }

        #input-panel {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        label.top {
            display: block;
            font-weight: bold;
            color: #525347;
            margin-bottom: 0.75rem;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            padding: 1rem;
            font-family: Verdana, sans-serif;
            font-size: 13px;
            line-height: 1.6;
            border: none;
            border-radius: 10px;
            background: #f7f7f2;
            color: #525347;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            background: white;
            box-shadow: 0 0 0 2px #b3b3ab;
        }

        .hint {
            font-size: 11px;
            color: #888;
            margin-top: 0.5rem;
        }

        #controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        button.button {
            background: #676758;
            border-radius: 10px;
            color: white;
            font-family: Verdana, sans-serif;
            font-size: 12px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            padding: 6px 18px;
            transition: background 0.1s;
        }

        button.button:hover:not(:disabled) {
            background: black;
        }

        button.button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status {
            flex: 1;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 11px;
            min-height: 28px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        #status.info    { background: #f0f0e8; color: #525347; }
        #status.success { background: #DCFFE7; color: #2a5c38; }
        #status.error   { background: #ffdfdf; color: #f74d4d; font-weight: bold; }
        #status.busy    { background: #f0f0e8; color: #525347; }

        .spinner {
            display: inline-block;
            width: 1em;
            height: 1em;
            border: 2px solid #676758;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #viz-panel {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
        }

        lint-ii-visualizer {
            display: block;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="header">
            <div id="logo"></div>
            <div id="header-text">
                <h1>LiNT-II Leesbaarheidsanalyse</h1>
                <p>Plak een Nederlandse tekst om leesbaarheidsuggesties te ontvangen.<br>
                LiNT-II analyseert de tekst en genereert verbeteringsvoorstellen met uitleg.</p>
            </div>
        </div>

        <div id="ruler"></div>

        <div id="input-panel">
            <label class="top" for="text-input">Voer tekst in:</label>
            <textarea id="text-input" placeholder="Plak hier een Nederlandse tekst…" spellcheck="false"></textarea>
            <p class="hint">Minimaal 10 tekens. De analyse duurt ongeveer 10–30 seconden.</p>
            <div id="controls">
                <button id="analyze-btn" class="button">Analyseren</button>
                <div id="status" class="info">Voer een tekst in en klik op Analyseren.</div>
            </div>
        </div>

        <div id="viz-panel">
            <lint-ii-visualizer id="viz" mode="editor"></lint-ii-visualizer>
        </div>
    </div>

    <script type="module" src="./src/visualizer/lint_ii_visualizer.js"></script>
    <script type="module">
        const textInput = document.getElementById('text-input')
        const analyzeBtn = document.getElementById('analyze-btn')
        const status = document.getElementById('status')
        const viz = document.getElementById('viz')

        function setStatus(html, type = 'info') {
            status.innerHTML = html
            status.className = type
        }

        function setLoading(on) {
            analyzeBtn.disabled = on
            textInput.disabled = on
        }

        analyzeBtn.addEventListener('click', async () => {
            const text = textInput.value.trim()
            if (text.length < 10) {
                setStatus('Voer minimaal 10 tekens in.', 'error')
                return
            }

            setLoading(true)
            setStatus('<span class="spinner"></span>Analyse bezig… (10–30 seconden)', 'busy')

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, max_suggestions: 5 }),
                })

                if (response.status === 503) {
                    setStatus('Een andere analyse is bezig. Probeer het over een minuut opnieuw.', 'busy')
                    return
                }
                if (!response.ok) {
                    const err = await response.json().catch(() => ({ detail: response.statusText }))
                    throw new Error(err.detail || response.statusText)
                }

                const data = await response.json()
                const count = data.suggestions?.suggestions?.length ?? 0

                viz.setAttribute('mode', count > 0 ? 'editor' : 'analysis')
                viz.data = data
                setStatus(
                    count > 0
                        ? `✓ Analyse klaar — ${count} suggesties gevonden.`
                        : '✓ Analyse klaar — geen suggesties gevonden.',
                    'success'
                )
            } catch (err) {
                setStatus(`Fout: ${err.message}`, 'error')
                console.error(err)
            } finally {
                setLoading(false)
            }
        })
    </script>
</body>
</html>
