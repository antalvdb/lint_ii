<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiNT-II | Leesbaarheidsanalyse</title>
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
        }
        h1 {
            border-bottom: 2px solid currentColor;
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            opacity: 0.7;
            margin-bottom: 2rem;
        }
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        textarea {
            width: 100%;
            min-height: 8rem;
            padding: 0.75rem;
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.6;
            border: 1px solid light-dark(hsl(0,0%,70%), hsl(0,0%,40%));
            border-radius: 0.375rem;
            background: light-dark(white, hsl(0,0%,12%));
            color: inherit;
            resize: vertical;
        }
        textarea:focus {
            outline: 2px solid light-dark(hsl(210,80%,50%), hsl(210,60%,60%));
            outline-offset: -1px;
        }
        .controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }
        button {
            padding: 0.5rem 1.25rem;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid currentColor;
            border-radius: 0.375rem;
            background: transparent;
            color: inherit;
            transition: background 0.1s;
        }
        button:hover:not(:disabled) {
            background: light-dark(hsl(0,0%,92%), hsl(0,0%,20%));
        }
        button.primary {
            background: light-dark(hsl(210,80%,50%), hsl(210,60%,45%));
            color: white;
            border-color: transparent;
            font-weight: 500;
        }
        button.primary:hover:not(:disabled) {
            background: light-dark(hsl(210,80%,42%), hsl(210,60%,55%));
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            padding: 0.4rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.9rem;
            flex: 1;
        }
        .status.info    { background: light-dark(hsl(210,50%,92%), hsl(210,30%,18%)); }
        .status.success { background: light-dark(hsl(120,50%,90%), hsl(120,30%,18%)); }
        .status.error   { background: light-dark(hsl(0,60%,92%),   hsl(0,30%,18%));  }
        .status.busy    { background: light-dark(hsl(40,80%,90%),  hsl(40,40%,18%)); }
        .spinner {
            display: inline-block;
            width: 1em;
            height: 1em;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 0.4em;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        lint-ii-visualizer { margin-block: 1.5rem; }
        .hint {
            font-size: 0.85rem;
            opacity: 0.65;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <h1>LiNT-II Leesbaarheidsanalyse</h1>
    <p class="subtitle">Plak een Nederlandse tekst om leesbaarheidsuggesties te ontvangen.</p>

    <div class="input-section">
        <textarea id="text-input" placeholder="Plak hier een Nederlandse tekst…" spellcheck="false"></textarea>
        <p class="hint">Minimaal 10 tekens. De analyse duurt ongeveer 10–30 seconden.</p>
        <div class="controls">
            <button id="analyze-btn" class="primary">Analyseren</button>
            <span id="status" class="status info">Voer een tekst in en klik op Analyseren.</span>
        </div>
    </div>

    <lint-ii-visualizer id="viz" mode="editor"></lint-ii-visualizer>

    <script type="module" src="./src/visualizer/lint_ii_visualizer.js"></script>
    <script type="module">
        const textInput = document.getElementById('text-input')
        const analyzeBtn = document.getElementById('analyze-btn')
        const status = document.getElementById('status')
        const viz = document.getElementById('viz')

        function setStatus(html, type = 'info') {
            status.innerHTML = html
            status.className = `status ${type}`
        }

        function setLoading(on) {
            analyzeBtn.disabled = on
            textInput.disabled = on
        }

        analyzeBtn.addEventListener('click', async () => {
            const text = textInput.value.trim()
            if (text.length < 10) {
                setStatus('Voer minimaal 10 tekens in.', 'error')
                return
            }

            setLoading(true)
            setStatus('<span class="spinner"></span>Analyse bezig… (10–30 seconden)', 'busy')

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, max_suggestions: 5 }),
                })

                if (response.status === 503) {
                    setStatus('Een andere analyse is bezig. Probeer het over een minuut opnieuw.', 'busy')
                    return
                }
                if (!response.ok) {
                    const err = await response.json().catch(() => ({ detail: response.statusText }))
                    throw new Error(err.detail || response.statusText)
                }

                const data = await response.json()
                const count = data.suggestions?.suggestions?.length ?? 0

                viz.setAttribute('mode', count > 0 ? 'editor' : 'analysis')
                viz.data = data
                setStatus(
                    count > 0
                        ? `✓ Analyse klaar — ${count} suggesties gevonden.`
                        : '✓ Analyse klaar — geen suggesties gevonden.',
                    'success'
                )
            } catch (err) {
                setStatus(`Fout: ${err.message}`, 'error')
                console.error(err)
            } finally {
                setLoading(false)
            }
        })
    </script>
</body>
</html>
