# Shared proxy config for the LiNT-II demo, included by each location block in
# strato-nginx-lint-ii.conf. Install to /etc/nginx/snippets/lint-ii-proxy.conf.
#
# The local uvicorn (systemd service), plain HTTP on loopback. If it is down
# this 502s (see the runbook's liveness note).
proxy_pass http://127.0.0.1:8000;
proxy_http_version 1.1;

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto https;

# The analyze flow is job + poll (short requests), but keep generous timeouts
# for a cold-start spaCy/model call.
proxy_connect_timeout 10s;
proxy_read_timeout 120s;
proxy_send_timeout 120s;

# Respect the app's X-Accel-Buffering: no on any streaming response.
proxy_buffering off;
