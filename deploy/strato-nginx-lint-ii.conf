# Strato front for the LiNT-II demo — reverse proxy on standard port 443.
#
# Why: the Mac Studio at home serves the fast demo on port 8443, but many
# restrictive client networks (mobile hotspots, corporate/guest WiFi, some
# carriers) only allow outbound 80/443, so testers on those networks get
# "the network did not allow a connection". This Strato box (a data-center
# host on a normal network) terminates TLS on 443 — reachable everywhere —
# and reverse-proxies to the home Mac Studio, which keeps doing inference.
#
# Topology:
#   client --443--> Strato (85.215.105.128, this box) --8443--> home Mac Studio
#
# DNS (managed in mijn.host):
#   lint-ii.valkuil.net  A -> 85.215.105.128            (this Strato box)
#   origin.valkuil.net   A -> <home router public IP>   (dynamic; keep DDNS
#                                                         updating THIS record
#                                                         instead of lint-ii)
#
# The home router still forwards 8443 -> 192.168.178.95:8443 (Mac Studio),
# and the Mac Studio still runs uvicorn with TLS on 8443 — unchanged.
#
# Install: copy to /etc/nginx/sites-available/lint-ii, ensure the symlink in
# sites-enabled, then `nginx -t && systemctl reload nginx`.

# HTTP: redirect to HTTPS, but keep the ACME path open so certbot can renew
# the lint-ii.valkuil.net cert on this box (DNS now points here).
server {
    listen 80;
    listen [::]:80;
    server_name lint-ii.valkuil.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name lint-ii.valkuil.net;

    # Cert already present on Strato for this name (renews here via the ACME
    # block above once DNS points to this box).
    ssl_certificate     /etc/letsencrypt/live/lint-ii.valkuil.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lint-ii.valkuil.net/privkey.pem;

    # Input text is capped at 10k chars app-side; this is generous headroom.
    client_max_body_size 1m;

    # Re-resolve the home address on the DNS TTL. The home IP is dynamic, so a
    # static upstream would cache a stale IP after the home connection changes.
    # Using a variable in proxy_pass forces per-request resolution via this
    # resolver instead of one-time resolution at config reload.
    resolver 1.1.1.1 8.8.8.8 valid=30s ipv6=off;
    resolver_timeout 5s;

    location / {
        set $origin "origin.valkuil.net";
        proxy_pass https://$origin:8443$request_uri;

        # The home server presents the lint-ii.valkuil.net cert. Send that name
        # as SNI so it selects the right cert. We do NOT verify the upstream
        # cert: once DNS no longer points home it can't renew via HTTP-01, so it
        # may go stale/mismatched — acceptable for a Strato<->home hop carrying
        # low-sensitivity readability text, and the public-facing TLS (client
        # <-> Strato) is fully valid.
        proxy_ssl_server_name on;
        proxy_ssl_name lint-ii.valkuil.net;
        proxy_ssl_verify off;

        proxy_set_header Host lint-ii.valkuil.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # The analyze flow is job + poll (short requests), but keep generous
        # timeouts for a cold-start spaCy/model call.
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Respect the app's X-Accel-Buffering: no on any streaming response.
        proxy_buffering off;
    }
}
