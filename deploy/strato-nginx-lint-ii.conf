# Strato front for the LiNT-II demo — reverse proxy on standard port 443.
#
# Why: the Mac Studio at home does the (fast) inference, but many restrictive
# client networks (mobile hotspots, corporate/guest WiFi, some carriers) only
# allow outbound 80/443, so testers on those networks get "the network did not
# allow a connection". This Strato box (a data-center host on a normal network)
# terminates TLS on 443 — reachable everywhere — and reverse-proxies to the home
# Mac Studio.
#
# Transport: the Mac Studio dials an OUTBOUND SSH reverse tunnel to this box
# (see deploy/mac/*.plist), publishing its local uvicorn on this box's
# 127.0.0.1:8000. nginx just proxies to that loopback port. Consequences:
#   - no inbound reachability to home is needed (no router port-forward),
#   - no dynamic-DNS / origin record (the Mac dials out; its IP can change
#     freely),
#   - the Mac<->Strato hop is encrypted by SSH, so the home server runs plain
#     HTTP on loopback and needs no TLS cert of its own.
#
# Topology:
#   client --443--> Strato (85.215.105.128, this box) --ssh reverse tunnel-->
#       127.0.0.1:8000 on this box  ==  127.0.0.1:8000 on the home Mac Studio
#
# DNS (managed in mijn.host):
#   lint-ii.valkuil.net  A -> 85.215.105.128   (this Strato box; static)
# That is the ONLY record needed. No origin.valkuil.net, no DDNS.
#
# Install: copy to /etc/nginx/sites-available/lint-ii, ensure the symlink in
# sites-enabled, then `nginx -t && systemctl reload nginx`.

# HTTP: redirect to HTTPS, but keep the ACME path open so certbot can renew
# the lint-ii.valkuil.net cert on this box (DNS points here).
server {
    listen 80;
    listen [::]:80;
    server_name lint-ii.valkuil.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lint-ii.valkuil.net;

    ssl_certificate     /etc/letsencrypt/live/lint-ii.valkuil.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lint-ii.valkuil.net/privkey.pem;

    # Input text is capped at 10k chars app-side; this is generous headroom.
    client_max_body_size 1m;

    location / {
        # The home Mac Studio's uvicorn, published here over the SSH reverse
        # tunnel. Loopback + plain HTTP: the SSH transport already encrypts the
        # hop, and the port is only reachable from this box. If the tunnel is
        # down this returns 502 (see the runbook's liveness note).
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # The analyze flow is job + poll (short requests), but keep generous
        # timeouts for a cold-start spaCy/model call.
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Respect the app's X-Accel-Buffering: no on any streaming response.
        proxy_buffering off;
    }
}
