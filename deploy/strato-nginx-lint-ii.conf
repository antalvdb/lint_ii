# Strato front for the LiNT-II demo — TLS on 443, reverse proxy to the local app.
#
# Why a data-center front: many restrictive client networks (mobile hotspots,
# corporate/guest WiFi, some carriers) allow only outbound 80/443, so testers on
# them otherwise get "the network did not allow a connection". This box
# terminates TLS on 443 — reachable everywhere.
#
# Topology (single box):
#   client --443--> nginx (this box) --proxy--> 127.0.0.1:8000 uvicorn (this box)
# uvicorn runs under systemd (see deploy/linux/), plain HTTP on loopback — no
# cert of its own needed. (Loopback:8000 is the same port the old home-Mac SSH
# reverse tunnel published, so proxy_pass is unchanged from that era.)
#
# DNS (managed in mijn.host):
#   lint-ii.valkuil.net  A -> 85.215.105.128   (this Strato box; static)
# That is the ONLY record needed.
#
# Install: copy to /etc/nginx/sites-available/lint-ii, ensure the symlink in
# sites-enabled, copy strato-nginx-lint-ii-proxy.conf to
# /etc/nginx/snippets/lint-ii-proxy.conf, then `nginx -t && systemctl reload nginx`.

# Abuse limits (http context — this file is included inside http{}). Keyed on
# client IP; a 10m zone holds ~160k addresses. /analyze and /convert are public
# and unauthenticated, so cap their request rate here (the app also caps pending
# jobs at 12 and returns 429). Polling and static assets are NOT rate-limited.
limit_req_zone  $binary_remote_addr  zone=lint_write:10m  rate=60r/m;
limit_conn_zone $binary_remote_addr  zone=lint_conn:10m;

# HTTP: redirect to HTTPS, but keep the ACME path open so certbot can renew
# the lint-ii.valkuil.net cert on this box (DNS points here).
server {
    listen 80;
    listen [::]:80;
    server_name lint-ii.valkuil.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lint-ii.valkuil.net;

    ssl_certificate     /etc/letsencrypt/live/lint-ii.valkuil.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lint-ii.valkuil.net/privkey.pem;

    # Input text is capped at 20k chars app-side; this is generous headroom.
    client_max_body_size 1m;
    # Slow-client (slowloris) defense: drop a client that dribbles its request.
    client_body_timeout 15s;
    client_header_timeout 15s;

    # Per-IP concurrent-connection cap, and make throttled requests return 429
    # (matching the app) instead of nginx's default 503.
    limit_conn        lint_conn 20;
    limit_conn_status 429;
    limit_req_status  429;

    # Defense in depth: never serve dotfiles (.git, .env, …) from the backend,
    # even if a future app change re-exposes them. The app already 404s these.
    # The negative lookahead keeps /.well-known reachable (harmless here on 443).
    location ~ /\.(?!well-known) {
        return 404;
    }

    # Work endpoints — rate-limited per IP. The proxy directives live in a shared
    # snippet so the three locations stay in sync.
    location = /analyze {
        limit_req zone=lint_write burst=15 nodelay;
        include snippets/lint-ii-proxy.conf;
    }
    location = /convert {
        limit_req zone=lint_write burst=5 nodelay;
        include snippets/lint-ii-proxy.conf;
    }

    # Everything else: the demo pages, versioned assets, and the high-frequency
    # /analyze-result polling and /health. Deliberately not rate-limited.
    location / {
        include snippets/lint-ii-proxy.conf;
    }
}
